kind = "web"
previewPath = "/"
title = "Optimal Dump Packing"
version = "1.0.0"
id = "artifacts/dump-packing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19474

[services.development]
run = "pnpm --filter @workspace/dump-packing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dump-packing", "run", "build" ]
publicDir = "artifacts/dump-packing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19474"
BASE_PATH = "/"
